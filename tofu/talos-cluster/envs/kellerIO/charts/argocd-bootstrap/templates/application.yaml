apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.application.name | quote }}
  namespace: {{ .Values.application.namespace | quote }}
spec:
  project: {{ .Values.application.project | quote }}
  source:
    repoURL: {{ .Values.application.source.repoURL | quote }}
    targetRevision: {{ .Values.application.source.targetRevision | quote }}
    path: {{ .Values.application.source.path | quote }}
  destination:
    server: {{ .Values.application.destination.server | quote }}
    namespace: {{ .Values.application.destination.namespace | quote }}
  syncPolicy:
    automated:
      prune: {{ .Values.application.syncPolicy.automated.prune }}
      selfHeal: {{ .Values.application.syncPolicy.automated.selfHeal }}
    syncOptions:
{{- range .Values.application.syncPolicy.syncOptions }}
      - {{ . | quote }}
{{- end }}
