# CI: format + syntax checks, validation and a security scan for the OpenTofu config.
# GitHub Actions. Mirror to Forgejo Actions if Forgejo becomes leading.
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  # Active deployment environment (see justfile / README).
  TOFU_ENV: tofu/talos-cluster/envs/kellerIO

jobs:
  # Format + syntax + validation. No backend/credentials needed.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: tofu fmt (syntax/style)
        run: tofu fmt -check -recursive

      - name: tofu init (no backend — fetches modules + providers)
        run: tofu -chdir=${{ env.TOFU_ENV }} init -backend=false

      - name: tofu validate
        run: tofu -chdir=${{ env.TOFU_ENV }} validate

  # Static security scan of the IaC (misconfigurations + leaked secrets).
  # Reports findings; does NOT fail the build yet — add `--exit-code 1` to enforce.
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Trivy IaC misconfiguration scan
        run: trivy config --severity HIGH,CRITICAL tofu

      - name: Trivy secret scan
        run: trivy fs --scanners secret --severity HIGH,CRITICAL .
